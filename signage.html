<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>CLEAR Digital Meter Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --burgundy: #64092C;
    --gold: #DDA838;
    --charcoal: #484848;
    --blue: #084D78;
    --white: #ffffff;
    --offwhite: #f5f0ea;
  }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: transparent;
    font-family: 'Open Sans', sans-serif;
  }

  #board {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Background */
  #bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    transition: opacity 0.8s ease;
  }

  /*
   * Content zone — locked to background design spec:
   * x: 63.7px  y: 369px  w: 961px  h: 1282px
   * Inner padding: 60px sides, 60px top/bottom
   */
  #content {
    position: absolute;
    z-index: 2;
    left: 59.4px;
    top: 362.9px;
    width: 961px;
    height: 1282px;
    display: flex;
    flex-direction: column;
    padding: 60px 60px 48px 60px;
    overflow: hidden;
  }

  /* Status badge — sits at top of content zone */
  #status-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 48px;
    align-self: flex-start;
    transition: all 0.5s ease;
    flex-shrink: 0;
  }

  #status-badge.live {
    background: var(--gold);
    color: #1a1a1a;
  }

  #status-badge.upcoming {
    background: transparent;
    color: var(--gold);
    border: 2px solid var(--gold);
    opacity: 0.85;
  }

  #status-badge .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  #status-badge.live .dot {
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Main session block — fills remaining vertical space */
  #session-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    min-height: 0;
  }

  #session-time {
    font-size: 36px;
    font-weight: 300;
    color: var(--white);
    opacity: 0.7;
    letter-spacing: 0.06em;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  /* Divider accent */
  .divider-thick {
    width: 100px;
    height: 3px;
    background: var(--gold);
    margin-bottom: 36px;
    flex-shrink: 0;
  }

  #session-title {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 52px;
    flex-shrink: 0;
  }

  #presenters-block {
    margin-bottom: 40px;
    flex-shrink: 0;
  }

  #presenters-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 12px;
  }

  #presenters-list {
    font-size: 32px;
    font-weight: 400;
    color: var(--white);
    opacity: 0.9;
    line-height: 1.4;
  }



  /* Clock — pinned to bottom of content zone */

  #clock {
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    opacity: 0.45;
    letter-spacing: 0.1em;
  }

  /* Transition overlay */
  #fade {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #fade.active { opacity: 1; }

  /* Hidden state */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="board">
  <img id="bg" src="" alt="">
  <div id="fade"></div>

  <div id="content">
    <div id="top-block">
      <div id="event-name"></div>
      <div id="room-name"></div>
    </div>

    <div class="divider"></div>

    <div id="status-badge" class="live">
      <div class="dot"></div>
      <span id="status-text">Now In Session</span>
    </div>

    <div id="session-block">
      <div id="session-time"></div>
      <div class="divider-thick"></div>
      <div id="session-title"></div>

      <div id="presenters-block">
        <div id="presenters-label">Presenter</div>
        <div id="presenters-list"></div>
      </div>


    </div>

    <div id="bottom-bar">
      <div id="clock"></div>
    </div>
  </div>
</div>

<script>
  // ─── Config ──────────────────────────────────────────────────────────────
  const SCHEDULE_URL = 'schedule.json';
  const REFRESH_INTERVAL = 60 * 1000;      // re-check schedule every 60s
  const CLOCK_INTERVAL  = 1000;            // clock tick every 1s

  // ─── Helpers ─────────────────────────────────────────────────────────────
  function getRoomId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('room') || '';
  }

  function parseTime(str, baseDate) {
    // str = "HH:MM", baseDate = Date object for the event day
    const [h, m] = str.split(':').map(Number);
    const d = new Date(baseDate);
    d.setHours(h, m, 0, 0);
    return d;
  }

  function formatTime12(str) {
    const [h, m] = str.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return `${hour}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  function formatClock(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  function el(id) { return document.getElementById(id); }

  function setVisible(id, show) {
    el(id).classList.toggle('hidden', !show);
  }

  // ─── Render ──────────────────────────────────────────────────────────────
  let currentSessionKey = null;

  function render(schedule, room, now) {
    const roomId = getRoomId();
    const roomData = schedule.rooms.find(r => r.id === roomId);

    if (!roomData) {
      el('room-name').textContent = 'Room Not Found';
      el('session-title').textContent = 'Check room ID in URL';
      return;
    }

    // Event date from schedule (use today's date for dev if not set)
    const eventDateStr = schedule.event_date || now.toISOString().split('T')[0];
    const [ey, em, ed] = eventDateStr.split('-').map(Number);
    const baseDate = new Date(ey, em - 1, ed);

    // Find current or next session
    const sessions = roomData.sessions;
    let displaySession = null;
    let isLive = false;
    let isUpcoming = false;

    for (let i = 0; i < sessions.length; i++) {
      const s = sessions[i];
      const start = parseTime(s.start, baseDate);
      const end   = parseTime(s.end,   baseDate);

      if (now >= start && now < end) {
        // Currently in session
        displaySession = s;
        isLive = true;
        break;
      }

      if (now < start) {
        // This session is upcoming — is it the NEXT one?
        // Check if no session is currently running
        const anyLive = sessions.some(ss => {
          const ss_start = parseTime(ss.start, baseDate);
          const ss_end   = parseTime(ss.end, baseDate);
          return now >= ss_start && now < ss_end;
        });
        if (!anyLive) {
          displaySession = s;
          isUpcoming = true;
        }
        break;
      }
    }

    if (!displaySession) {
      // All sessions done for the day
      displaySession = { title: 'No further sessions today', track: 'governance', start: '', end: '', presenters: [], sponsor: '' };
    }

    // Build a unique key to detect change
    const sessionKey = `${displaySession.title}|${isLive}`;
    if (sessionKey === currentSessionKey) return; // nothing changed

    // Fade transition
    const fade = el('fade');
    fade.classList.add('active');

    setTimeout(() => {
      applySession(schedule, roomData, displaySession, isLive, isUpcoming, eventDateStr);
      currentSessionKey = sessionKey;
      fade.classList.remove('active');
    }, 500);
  }

  function applySession(schedule, roomData, session, isLive, isUpcoming, eventDateStr) {
    const trackData = schedule.tracks[session.track] || schedule.tracks['governance'];

    // Background
    el('bg').src = trackData.background;

    // Top block
    el('event-name').textContent = schedule.event || 'CLEAR Annual Educational Conference';
    el('room-name').textContent  = roomData.name;

    // Status badge
    const badge = el('status-badge');
    const statusText = el('status-text');
    if (isLive) {
      badge.className = 'live';
      statusText.textContent = 'Now In Session';
    } else {
      badge.className = 'upcoming';
      statusText.textContent = 'Coming Up Next';
    }

    // Time
    if (session.start && session.end) {
      el('session-time').textContent = `${formatTime12(session.start)} – ${formatTime12(session.end)}`;
    } else {
      el('session-time').textContent = '';
    }

    // Title
    el('session-title').textContent = session.title || '';

    // Presenters
    const hasPresenters = session.presenters && session.presenters.length > 0;
    setVisible('presenters-block', hasPresenters);
    if (hasPresenters) {
      el('presenters-label').textContent = session.presenters.length > 1 ? 'Presenters' : 'Presenter';
      el('presenters-list').textContent = session.presenters.join('\n');
      el('presenters-list').style.whiteSpace = 'pre-line';
    }


  }

  // ─── Clock ───────────────────────────────────────────────────────────────
  function tickClock() {
    el('clock').textContent = formatClock(new Date());
  }

  // ─── Main loop ───────────────────────────────────────────────────────────
  let scheduleCache = null;

  async function loadAndRender() {
    try {
      const resp = await fetch(SCHEDULE_URL + '?_=' + Date.now());
      scheduleCache = await resp.json();
    } catch (e) {
      console.warn('Could not load schedule.json', e);
    }
    if (scheduleCache) {
      render(scheduleCache, getRoomId(), new Date());
    }
  }

  // Initial load
  loadAndRender();
  tickClock();

  // Refresh schedule periodically
  setInterval(loadAndRender, REFRESH_INTERVAL);

  // Clock tick
  setInterval(tickClock, CLOCK_INTERVAL);

  // Also re-render on each clock tick in case session just flipped
  setInterval(() => {
    if (scheduleCache) render(scheduleCache, getRoomId(), new Date());
  }, CLOCK_INTERVAL);
</script>
</body>
</html>
