<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAR Digital Meter Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --track-color: #484848; }

  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Open Sans', sans-serif; }

  #board { width: 1080px; height: 1920px; position: absolute; top: 0; left: 0; transform-origin: top left; }

  #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

  #content {
    position: absolute; z-index: 2;
    left: 59.4px; top: 362.9px; width: 961px; height: 1282px;
    display: flex; flex-direction: column;
    padding: 60px 60px 48px 60px; overflow: hidden;
  }

  #status-badge {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 12px 24px; border-radius: 4px; font-size: 20px;
    font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 48px; align-self: flex-start;
    transition: all 0.5s ease; flex-shrink: 0;
  }
  #status-badge.live     { background: var(--track-color); color: #ffffff; }
  #status-badge.upcoming { background: transparent; color: var(--track-color); border: 2px solid var(--track-color); }
  #status-badge .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  #status-badge.live .dot { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

  #session-block { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; min-height: 0; }

  #session-time { font-size: 36px; font-weight: 300; color: #000; letter-spacing: 0.06em; margin-bottom: 24px; flex-shrink: 0; }

  .divider-thick { width: 100px; height: 3px; background: var(--track-color); margin-bottom: 36px; flex-shrink: 0; }

  #session-title { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 700; color: #000; line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 52px; flex-shrink: 0; }

  #presenters-block { margin-bottom: 40px; flex-shrink: 0; }
  #presenters-label { font-size: 16px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; padding: 2px 7px; color: white; background-color: var(--track-color); border-radius: 4px; margin-bottom: 12px; display: inline-block; }
  #presenters-list { font-size: 32px; font-weight: 400; color: #000; line-height: 1.4; }

  #bottom-bar { margin-top: auto; padding-top: 32px; display: flex; align-items: center; flex-shrink: 0; }

  #fade { position: absolute; inset: 0; background: #f5f0ea; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
  #fade.active { opacity: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="board">
  <img id="bg" src="" alt="">
  <div id="fade"></div>
  <div id="content">
    <div id="status-badge" class="live">
      <div class="dot"></div>
      <span id="status-text">Now In Session</span>
    </div>
    <div id="session-block">
      <div id="session-time"></div>
      <div class="divider-thick"></div>
      <div id="session-title"></div>
      <div id="presenters-block">
        <div id="presenters-label">Presenter</div>
        <div id="presenters-list"></div>
      </div>
    </div>
    <div id="bottom-bar">
    </div>
  </div>
</div>

<script>
  function scaleBoard() {
    const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
    document.getElementById('board').style.transform = 'scale(' + scale + ')';
  }
  scaleBoard();
  window.addEventListener('resize', scaleBoard);

  const SCHEDULE_URL     = 'https://novi-pheedloop-worker.avance.workers.dev/signage-schedule';
  const REFRESH_INTERVAL = 60 * 1000;
  const CLOCK_INTERVAL   = 1000;

  function getRoomId() {
    return new URLSearchParams(window.location.search).get('room') || '';
  }

  function todayString() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  function parseTime(timeStr, dateStr) {
    const parts = timeStr.split(':').map(Number);
    const dateParts = dateStr.split('-').map(Number);
    const d = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
    d.setHours(parts[0], parts[1], 0, 0);
    return d;
  }

  function formatTime12(str) {
    const parts = str.split(':').map(Number);
    const ampm = parts[0] >= 12 ? 'PM' : 'AM';
    const hour  = parts[0] % 12 || 12;
    return hour + ':' + String(parts[1]).padStart(2,'0') + ' ' + ampm;
  }

  function formatClock(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  }

  function el(id) { return document.getElementById(id); }
  function setVisible(id, show) { el(id).classList.toggle('hidden', !show); }

  let currentSessionKey = null;

  function render(schedule, roomId, now) {
    const roomData = schedule.rooms.find(r => r.id === roomId);
    if (!roomData) { el('session-title').textContent = 'Room not found'; return; }

    const today = todayString();

    // Only look at today's sessions
    const todaySessions = roomData.sessions.filter(s => s.date === today);

    // Sort by start time
    const sessions = [...todaySessions].sort((a, b) => a.start.localeCompare(b.start));

    let displaySession = null;
    let isLive = false;

    // Find live session
    for (let i = 0; i < sessions.length; i++) {
      const start = parseTime(sessions[i].start, today);
      const end   = parseTime(sessions[i].end,   today);
      if (now >= start && now < end) {
        displaySession = sessions[i];
        isLive = true;
        break;
      }
    }

    // Find next upcoming session
    if (!displaySession) {
      for (let i = 0; i < sessions.length; i++) {
        const start = parseTime(sessions[i].start, today);
        if (start > now) {
          displaySession = sessions[i];
          break;
        }
      }
    }

    if (!displaySession) {
      displaySession = { title: 'No further sessions today', track: 'RAG', date: today, start: '', end: '', presenters: [] };
    }

    const trackData = schedule.tracks[displaySession.track]
      || schedule.tracks[displaySession.track.toUpperCase()]
      || schedule.tracks[displaySession.track.toLowerCase()]
      || Object.values(schedule.tracks)[0];

    const sessionKey = displaySession.title + '|' + isLive + '|' + (trackData.color||'');
    if (sessionKey === currentSessionKey) return;

    const fade = el('fade');
    fade.classList.add('active');
    setTimeout(function() {
      applySession(schedule, displaySession, isLive, trackData);
      currentSessionKey = sessionKey;
      fade.classList.remove('active');
    }, 500);
  }

  function applySession(schedule, session, isLive, trackData) {
    document.getElementById('board').style.setProperty('--track-color', trackData.color || '#484848');
    el('bg').src = trackData.background;

    el('status-badge').className = isLive ? 'live' : 'upcoming';
    el('status-text').textContent = isLive ? 'Now In Session' : 'Coming Up Next';

    el('session-time').textContent = (session.start && session.end)
      ? formatTime12(session.start) + ' \u2013 ' + formatTime12(session.end)
      : '';

    el('session-title').textContent = session.title || '';

    const hasPresenters = session.presenters && session.presenters.length > 0;
    setVisible('presenters-block', hasPresenters);
    if (hasPresenters) {
      el('presenters-label').textContent = session.presenters.length > 1 ? 'Presenters' : 'Presenter';
      el('presenters-list').textContent  = session.presenters.join('\n');
      el('presenters-list').style.whiteSpace = 'pre-line';
    }
  }

  function tickClock() { el('clock').textContent = formatClock(new Date()); }

  let scheduleCache = null;

  async function loadAndRender() {
    try {
      const resp = await fetch(SCHEDULE_URL + '?_=' + Date.now());
      scheduleCache = await resp.json();
    } catch(e) { console.warn('Schedule load failed', e); }
    if (scheduleCache) render(scheduleCache, getRoomId(), new Date());
  }

  loadAndRender();
  tickClock();
  setInterval(loadAndRender, REFRESH_INTERVAL);
  setInterval(tickClock, CLOCK_INTERVAL);
  setInterval(function() {
    if (scheduleCache) render(scheduleCache, getRoomId(), new Date());
  }, CLOCK_INTERVAL);
</script>
</body>
</html>
